name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug brand assets before Docker build
        run: |
          echo "=== Checking public/brand-assets in GitHub runner ==="
          pwd
          ls -la public/brand-assets
          test -f public/brand-assets/logo_thumbnail.svg

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: mauromsilva
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: false
          provenance: false
          build-args: |
            BUNDLE_WITHOUT=development:test
            EXECJS_RUNTIME=Node
            RAILS_ENV=production
            RAILS_SERVE_STATIC_FILES=true
          tags: |
            ghcr.io/mauromsilva/sunass-atendimento:latest
            ghcr.io/mauromsilva/sunass-atendimento:v1.0.0
