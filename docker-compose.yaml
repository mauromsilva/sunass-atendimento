version: '3.8'

x-app-image: &app_image ghcr.io/mauromsilva/sunass-atendimento:latest



services:
  rails:
    image: *app_image
    pull_policy: always

    volumes:
      - storage:/app/storage

    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - RAILS_SERVE_STATIC_FILES=true
      - INSTALLATION_ENV=docker
      - FRONTEND_URL=https://atendimento.sunriseservice.com.br
      - POSTGRES_HOST=u1c8z1v4ok5wchiudmgspvfz
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=sunrise
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=sunrise
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@w119gq4ig711p8m4hnblofsu:6379

    command: sh -lc "bundle exec rails s -p 3000 -b 0.0.0.0"

    expose:
      - "3000"

    restart: always

    networks:
      - coolify

  sidekiq:
    image: *app_image
    pull_policy: always

    volumes:
      - storage:/app/storage

    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - RAILS_SERVE_STATIC_FILES=true
      - INSTALLATION_ENV=docker
      - FRONTEND_URL=https://atendimento.sunriseservice.com.br
      - POSTGRES_HOST=u1c8z1v4ok5wchiudmgspvfz
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=sunrise
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=sunrise
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@w119gq4ig711p8m4hnblofsu:6379

    command: sh -lc "bundle exec sidekiq -C config/sidekiq.yml"

    restart: always

    networks:
      - coolify

volumes:
  storage:

networks:
  coolify:
    external: true
