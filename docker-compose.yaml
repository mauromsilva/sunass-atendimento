version: "3.8"

services:
  rails:
    image: chatwoot/chatwoot:latest
    pull_policy: always
    volumes:
      - storage:/app/storage
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - FRONTEND_URL=https://atendimento.sunriseservice.com.br
      - POSTGRES_HOST=u1c8z1v4ok5wchiudmgspvfz
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=sunrise
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=sunrise
      - SECRET_KEY_BASE=${SERVICE_PASSWORD_64_SECRETKEYBASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@w119gq4ig711p8m4hnblofsu:6379
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    expose:
      - "3000"
    networks:
      - coolify
    restart: always

  sidekiq:
    image: chatwoot/chatwoot:latest
    pull_policy: always
    volumes:
      - storage:/app/storage
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - FRONTEND_URL=https://atendimento.sunriseservice.com.br
      - POSTGRES_HOST=u1c8z1v4ok5wchiudmgspvfz
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=sunrise
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=sunrise
      - SECRET_KEY_BASE=${SERVICE_PASSWORD_64_SECRETKEYBASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@w119gq4ig711p8m4hnblofsu:6379
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    networks:
      - coolify
    restart: always

volumes:
  storage:

networks:
  coolify:
    external: true
