version: "3.8"

services:
  rails:
    <<: *base
    build:
      context: .
      dockerfile: ./docker/dockerfiles/rails.Dockerfile
    image: chatwoot-rails:latest
    pull_policy: always
    volumes:
      - ./:/app:delegated
      - storage:/app/storage
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - FRONTEND_URL=${SERVICE_URL_RAILS}
      - POSTGRES_HOST=u1c8z1v4ok5wchiudmgspvfz
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=sunrise
      - POSTGRES_PASSWORD=mmsjj23yb!
      - POSTGRES_DATABASE=sunrise
      - SECRET_KEY_BASE=${SERVICE_PASSWORD_64_SECRETKEYBASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379

    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    expose:
      - "3000"
    depends_on:
      - redis
      - sidekiq
      - postgres
    networks:
      - coolify
    ports:
      - 3000:3000
    env_file: .env


  sidekiq:
    <<: *base
    image: chatwoot-rails:latest
    pull_policy: always
    volumes:
      - storage:/app/storage
      - ./:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - FRONTEND_URL=${SERVICE_URL_RAILS}
      - POSTGRES_HOST=u1c8z1v4ok5wchiudmgspvfz
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=sunrise
      - POSTGRES_PASSWORD=mmsjj23yb!
      - POSTGRES_DATABASE=sunrise
      - SECRET_KEY_BASE=${SERVICE_PASSWORD_64_SECRETKEYBASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    depends_on:
      - postgres
      - redis
    networks:
      - coolify

  redis:
    image: redis:7-alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    volumes:
      - redis:/data
    networks:
      - coolify

volumes:
  storage:
  redis:

networks:
  coolify:
    external: true
